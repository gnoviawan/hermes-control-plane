services:
  hermes:
    image: nousresearch/hermes-agent:v2026.4.13
    container_name: hermes-control-plane-hermes
    restart: unless-stopped
    command: /bin/sh -lc "sleep infinity"
    volumes:
      - ai-hermes-abhj7f_hermes_data:/opt/data
      - ai-hermes-abhj7f_hermes_profiles:/opt/data/profiles
      - ai-hermes-abhj7f_hermes_agent_src:/opt/hermes
    networks:
      - hermes-control-net

  control-plane:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: hermes-control-plane
    restart: unless-stopped
    depends_on:
      - hermes
    ports:
      - "8080:8080"
    environment:
      HERMES_HOME: /opt/data
      HERMES_BIN: /opt/hermes/.venv/bin/hermes
      STATIC_DIR: /app/static
    volumes:
      - ai-hermes-abhj7f_hermes_data:/opt/data
      - ai-hermes-abhj7f_hermes_profiles:/opt/data/profiles
      - ai-hermes-abhj7f_hermes_agent_src:/opt/hermes:ro
    networks:
      - hermes-control-net
      - dokploy-network

volumes:
  ai-hermes-abhj7f_hermes_data:
    external: true
  ai-hermes-abhj7f_hermes_profiles:
    external: true
  ai-hermes-abhj7f_hermes_agent_src:
    external: true

networks:
  hermes-control-net:
    driver: bridge
  dokploy-network:
    external: true
