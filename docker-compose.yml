services:
  hermes:
    image: nousresearch/hermes-agent:v2026.4.13
    container_name: hermes-control-plane-hermes
    restart: unless-stopped
    entrypoint: ["sleep"]
    command: ["infinity"]
    volumes:
      - hermes_data:/opt/data
    networks:
      - hermes-control-net

  dashboard:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: hermes-control-plane-dashboard
    restart: unless-stopped
    depends_on:
      - hermes
    expose:
      - "8080"
    environment:
      HERMES_HOME: /opt/data
      HERMES_BIN: /opt/hermes/.venv/bin/hermes
      HERMES_ROOT: /opt/hermes
      STATIC_DIR: /app/static
    volumes:
      - hermes_data:/opt/data
    networks:
      - hermes-control-net
      - dokploy-network

volumes:
  hermes_data:

networks:
  hermes-control-net:
    driver: bridge
  dokploy-network:
    external: true
