services:
  dashboard:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: hermes-control-plane
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HERMES_HOME: /home/hermes/.hermes
      HERMES_BIN: /home/hermes/.hermes/hermes-agent/.venv/bin/hermes
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-changeme}
    volumes:
      - /opt/data:/home/hermes/.hermes
      - /opt/hermes:/home/hermes/.hermes/hermes-agent:ro

  hermes-sidecar:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-sidecar
    restart: unless-stopped
    ports:
      - "8788:8787"
    environment:
      WANTED_UID: "10000"
      WANTED_GID: "10000"
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: "8787"
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
    volumes:
      - /opt/data:/home/hermeswebui/.hermes
      - /opt/hermes:/home/hermeswebui/.hermes/hermes-agent:ro
      - /opt/data:/workspace
