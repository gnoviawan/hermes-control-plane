services:
  hermes:
    image: nousresearch/hermes-agent:v2026.4.13
    container_name: hermes-control-plane-hermes
    restart: unless-stopped
    entrypoint: ["sleep"]
    command: ["infinity"]
    volumes:
      - type: bind
        source: ${HERMES_DATA_PATH:-/opt/data}
        target: /opt/data
      - type: bind
        source: ${HERMES_RUNTIME_PATH:-/opt/hermes}
        target: /opt/hermes
        read_only: true
    networks:
      - hermes-control-net

  dashboard:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: hermes-control-plane-dashboard
    restart: unless-stopped
    depends_on:
      - hermes
    expose:
      - "8080"
    environment:
      HERMES_HOME: /opt/data
      HERMES_BIN: ${HERMES_BIN:-/opt/hermes/.venv/bin/hermes}
      HERMES_ROOT: /opt/hermes
      STATIC_DIR: /app/static
    volumes:
      - type: bind
        source: ${HERMES_DATA_PATH:-/opt/data}
        target: /opt/data
      - type: bind
        source: ${HERMES_RUNTIME_PATH:-/opt/hermes}
        target: /opt/hermes
        read_only: true
    networks:
      - hermes-control-net
      - dokploy-network

networks:
  hermes-control-net:
    driver: bridge
  dokploy-network:
    external: true
